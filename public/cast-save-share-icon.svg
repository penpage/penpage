<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <!-- 淺色圓形背景 -->
  <circle cx="12" cy="12" r="11" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <!-- 頁面圖示（右上角折角，右下角開口）-->
  <!-- 頂部 + 右上折角 + 右側（到開口）-->
  <path d="M7 4h6l4 4v6" fill="none" stroke="#333" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- 折角三角形 -->
  <path d="M13 4v4h4" fill="none" stroke="#333" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- 左側 + 底部（連接，無右側垂直線）-->
  <path d="M7 4v13h4" fill="none" stroke="#333" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- 右下角下載符號（箭頭+底線）-->
  <line x1="15" y1="13" x2="15" y2="17" stroke="#333" stroke-width="1.4" stroke-linecap="round"/>
  <polyline points="13,15.5 15,17.5 17,15.5" fill="none" stroke="#333" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="13" y1="19" x2="17" y2="19" stroke="#333" stroke-width="1.4" stroke-linecap="round"/>
</svg>
