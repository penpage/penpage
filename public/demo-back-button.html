<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>返回按鈕「〈」設計比較</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 24px;
  }
  h1 { font-size: 20px; margin-bottom: 8px; color: #fff; }
  h2 { font-size: 16px; margin: 32px 0 16px; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 8px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
    gap: 24px;
  }
  .variant {
    background: #16213e;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid #333;
  }
  .variant-label {
    font-size: 13px;
    color: #7eb8ff;
    font-weight: 600;
    margin-bottom: 12px;
    font-family: monospace;
  }
  .variant-label .tag {
    display: inline-block;
    background: #1a3a5c;
    padding: 2px 8px;
    border-radius: 4px;
    margin-right: 6px;
  }

  /* Sidebar Header 模擬 */
  .sidebar-header {
    display: flex;
    align-items: center;
    background: #1e1e2e;
    height: 44px;
    padding: 0 8px;
    border-radius: 8px;
    margin-bottom: 10px;
    gap: 4px;
  }
  .sidebar-header .back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    color: #7eb8ff;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .sidebar-header .back-btn:hover { background: rgba(255,255,255,0.08); }
  .sidebar-header .title {
    font-size: 15px;
    font-weight: 600;
    color: #e0e0e0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .sidebar-header .action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    background: none;
    border: none;
    color: #888;
    cursor: pointer;
    border-radius: 6px;
    font-size: 18px;
    flex-shrink: 0;
  }

  /* Editor Toolbar 模擬 */
  .editor-toolbar {
    display: flex;
    align-items: center;
    background: #2a2a3e;
    height: 40px;
    padding: 0 8px;
    border-radius: 8px;
    gap: 2px;
  }
  .editor-toolbar .back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    color: #7eb8ff;
    cursor: pointer;
    padding: 4px 8px;
    margin-right: 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .editor-toolbar .back-btn:hover { background: rgba(255,255,255,0.08); }
  .editor-toolbar .tool-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    background: none;
    border: none;
    color: #999;
    cursor: pointer;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
  }
  .editor-toolbar .separator {
    width: 1px;
    height: 20px;
    background: #444;
    margin: 0 4px;
  }

  /* 對比區 */
  .compare-row {
    display: flex;
    gap: 16px;
    margin-bottom: 8px;
  }
  .compare-row .label {
    font-size: 11px;
    color: #666;
    width: 100px;
    flex-shrink: 0;
    line-height: 40px;
  }
  .compare-row .demo { flex: 1; }

  /* 單獨大圖展示 */
  .icon-showcase {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 12px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
  }
  .icon-showcase .icon-box {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    border: 1px dashed #444;
    border-radius: 8px;
    color: #7eb8ff;
  }
  .icon-showcase .params {
    font-size: 12px;
    color: #888;
    font-family: monospace;
  }
</style>
</head>
<body>

<h1>返回按鈕「〈」設計比較</h1>
<p class="subtitle">每個變體同時展示在 Sidebar Header 和 Editor Toolbar 中的效果。SVG path: M10 12L6 8L10 4 (viewBox 0 0 16 16)</p>

<h2>變體一覽</h2>

<div class="grid" id="variants"></div>

<script>
// 定義所有變體
const variants = [
  { id: 'A', size: 20, sw: 2,   desc: '現況 (WorkspaceHeader)' },
  { id: 'B', size: 24, sw: 2,   desc: '現況 (Sidebar Portrait)' },
  { id: 'C', size: 20, sw: 2.5, desc: '加粗' },
  { id: 'D', size: 22, sw: 2.5, desc: '中型加粗' },
  { id: 'E', size: 24, sw: 2.5, desc: '大型加粗' },
  { id: 'F', size: 24, sw: 3,   desc: '大型粗體' },
  { id: 'G', size: 28, sw: 2.5, desc: '超大加粗' },
  { id: 'H', size: 28, sw: 3,   desc: '超大粗體' },
  { id: 'I', size: 20, sw: 3,   desc: '小型粗體' },
  { id: 'J', size: 22, sw: 3,   desc: '中型粗體' },
];

function chevronSVG(size, strokeWidth) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12L6 8L10 4"/></svg>`;
}

const container = document.getElementById('variants');

variants.forEach(v => {
  const card = document.createElement('div');
  card.className = 'variant';
  card.innerHTML = `
    <div class="variant-label">
      <span class="tag">#${v.id}</span>
      size=${v.size} · strokeWidth=${v.sw} — ${v.desc}
    </div>

    <div class="icon-showcase">
      <div class="icon-box">${chevronSVG(v.size, v.sw)}</div>
      <div class="params">${v.size}px × ${v.size}px, stroke: ${v.sw}</div>
    </div>

    <div class="compare-row">
      <div class="label">Sidebar Header</div>
      <div class="demo">
        <div class="sidebar-header">
          <button class="back-btn">${chevronSVG(v.size, v.sw)}</button>
          <span class="title">工作筆記</span>
          <button class="action-btn">⋯</button>
        </div>
      </div>
    </div>

    <div class="compare-row">
      <div class="label">Editor Toolbar</div>
      <div class="demo">
        <div class="editor-toolbar">
          <button class="back-btn">${chevronSVG(v.size, v.sw)}</button>
          <button class="tool-btn"><b>B</b></button>
          <button class="tool-btn"><i>I</i></button>
          <button class="tool-btn"><u>U</u></button>
          <div class="separator"></div>
          <button class="tool-btn">H1</button>
          <button class="tool-btn">H2</button>
        </div>
      </div>
    </div>
  `;
  container.appendChild(card);
});
</script>

</body>
</html>
